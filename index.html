<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한반도 기후 변화 경향성 분석</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
<script crossorigin src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease-out; }
  body { font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useRef } = React;

// ====== 아이콘 ======
const Icon = ({ children, className = '' }) => (
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
    {children}
  </svg>
);
const Cloud = (p) => <Icon {...p}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></Icon>;
const Thermometer = (p) => <Icon {...p}><path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/></Icon>;
const Droplets = (p) => <Icon {...p}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"/></Icon>;
const Upload = (p) => <Icon {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></Icon>;
const ExternalLink = (p) => <Icon {...p}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></Icon>;
const X = (p) => <Icon {...p}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
const AlertCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></Icon>;
const CheckCircle2 = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></Icon>;
const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
const BarChart3 = (p) => <Icon {...p}><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></Icon>;

// ====== 선형 회귀 (최소제곱법) ======
function linearRegression(data) {
  const n = data.length;
  if (n < 2) return null;
  const sumX = data.reduce((s, d) => s + d.year, 0);
  const sumY = data.reduce((s, d) => s + d.value, 0);
  const sumXY = data.reduce((s, d) => s + d.year * d.value, 0);
  const sumX2 = data.reduce((s, d) => s + d.year * d.year, 0);
  const denom = n * sumX2 - sumX * sumX;
  if (denom === 0) return null;
  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;
  const meanY = sumY / n;
  let ssRes = 0, ssTot = 0;
  data.forEach(d => {
    const pred = slope * d.year + intercept;
    ssRes += (d.value - pred) ** 2;
    ssTot += (d.value - meanY) ** 2;
  });
  const r2 = ssTot === 0 ? 1 : 1 - ssRes / ssTot;
  return { slope, intercept, r2 };
}

// ====== 직접 만든 SVG 차트 ======
function SVGLineChart({ data, color, yLabel, unit, p1Avg, p2Avg, chartType, showTrend }) {
  const [hover, setHover] = useState(null);
  const W = 700, H = 340;
  const pad = { top: 30, right: 50, bottom: 50, left: 60 };
  const innerW = W - pad.left - pad.right;
  const innerH = H - pad.top - pad.bottom;

  if (!data || data.length === 0) {
    return <div className="flex items-center justify-center h-full text-slate-400 text-sm">해당 데이터가 없습니다</div>;
  }

  const xs = data.map(d => d.year);
  const ys = data.map(d => d.value);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const trend = (showTrend && data.length >= 2) ? linearRegression(data) : null;
  const allY = [...ys];
  if (p1Avg !== null) allY.push(p1Avg);
  if (p2Avg !== null) allY.push(p2Avg);
  if (trend) {
    allY.push(trend.slope * xMin + trend.intercept);
    allY.push(trend.slope * xMax + trend.intercept);
  }
  let yMin = Math.min(...allY), yMax = Math.max(...allY);
  const yPad = (yMax - yMin) * 0.15 || 1;
  yMin -= yPad; yMax += yPad;

  const xScale = (x) => pad.left + ((x - xMin) / (xMax - xMin || 1)) * innerW;
  const yScale = (y) => pad.top + (1 - (y - yMin) / (yMax - yMin || 1)) * innerH;

  const pathD = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${xScale(d.year)} ${yScale(d.value)}`).join(' ');

  const yTicks = [];
  for (let i = 0; i <= 5; i++) yTicks.push(yMin + (yMax - yMin) * (i / 5));

  const xTicks = [];
  const tickStep = (xMax - xMin) > 30 ? 10 : 5;
  for (let y = Math.ceil(xMin / tickStep) * tickStep; y <= xMax; y += tickStep) xTicks.push(y);
  if (xTicks.length === 0 || xTicks[0] !== xMin) xTicks.unshift(xMin);
  if (xTicks[xTicks.length - 1] !== xMax) xTicks.push(xMax);

  const fmtY = (y) => chartType === 'temp' ? y.toFixed(1) : Math.round(y).toLocaleString();
  const fmtV = (v) => chartType === 'temp' ? `${v.toFixed(1)} ${unit}` : `${Math.round(v).toLocaleString()} ${unit}`;

  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-full" onMouseLeave={() => setHover(null)}>
      {/* 그리드 + Y라벨 */}
      {yTicks.map((y, i) => (
        <g key={i}>
          <line x1={pad.left} x2={W - pad.right} y1={yScale(y)} y2={yScale(y)} stroke="#e2e8f0" strokeDasharray="3 3" />
          <text x={pad.left - 8} y={yScale(y)} textAnchor="end" dominantBaseline="middle" fontSize="11" fill="#64748b">{fmtY(y)}</text>
        </g>
      ))}
      {/* X라벨 */}
      {xTicks.map((x, i) => (
        <text key={i} x={xScale(x)} y={H - pad.bottom + 18} textAnchor="middle" fontSize="11" fill="#64748b">{x}</text>
      ))}
      {/* 축 제목 */}
      <text x={pad.left + innerW / 2} y={H - 8} textAnchor="middle" fontSize="12" fill="#64748b">연도 (년)</text>
      <text x={18} y={pad.top + innerH / 2} textAnchor="middle" fontSize="12" fill="#64748b" transform={`rotate(-90 18 ${pad.top + innerH / 2})`}>{yLabel}</text>

      {/* 평균선 */}
      {p1Avg !== null && (
        <g>
          <line x1={pad.left} x2={W - pad.right} y1={yScale(p1Avg)} y2={yScale(p1Avg)} stroke="#94a3b8" strokeDasharray="4 4" />
          <text x={pad.left + 5} y={yScale(p1Avg) - 4} fontSize="10" fill="#64748b">㉠ 86~15 평균 {fmtY(p1Avg)}</text>
        </g>
      )}
      {p2Avg !== null && (
        <g>
          <line x1={pad.left} x2={W - pad.right} y1={yScale(p2Avg)} y2={yScale(p2Avg)} stroke={color} strokeDasharray="4 4" strokeOpacity="0.7" />
          <text x={W - pad.right - 5} y={yScale(p2Avg) - 4} fontSize="10" fill={color} textAnchor="end">㉡ 96~25 평균 {fmtY(p2Avg)}</text>
        </g>
      )}

      {/* 데이터 선 */}
      <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round" />
      {/* 추세선 */}
      {trend && (
        <line x1={xScale(xMin)} y1={yScale(trend.slope * xMin + trend.intercept)}
              x2={xScale(xMax)} y2={yScale(trend.slope * xMax + trend.intercept)}
              stroke="#dc2626" strokeWidth="2" strokeDasharray="6 4" opacity="0.85" />
      )}
      {/* 데이터 포인트 */}
      {data.map((d, i) => (
        <circle key={i} cx={xScale(d.year)} cy={yScale(d.value)} r="3" fill={color} />
      ))}
      {/* 호버 영역 */}
      {data.map((d, i) => (
        <rect key={`h${i}`}
          x={xScale(d.year) - (innerW / data.length / 2)}
          y={pad.top}
          width={innerW / data.length}
          height={innerH}
          fill="transparent"
          onMouseEnter={() => setHover(d)}
        />
      ))}
      {/* 툴팁 */}
      {hover && (
        <g pointerEvents="none">
          <line x1={xScale(hover.year)} x2={xScale(hover.year)} y1={pad.top} y2={H - pad.bottom} stroke={color} strokeOpacity="0.3" />
          <circle cx={xScale(hover.year)} cy={yScale(hover.value)} r="5" fill="white" stroke={color} strokeWidth="2" />
          <g transform={`translate(${Math.min(xScale(hover.year) + 10, W - pad.right - 110)}, ${Math.max(yScale(hover.value) - 40, pad.top + 5)})`}>
            <rect x="0" y="0" width="105" height="38" rx="8" fill="white" stroke="#e2e8f0" />
            <text x="10" y="15" fontSize="11" fill="#64748b">{hover.year}년</text>
            <text x="10" y="30" fontSize="12" fontWeight="bold" fill={color}>{fmtV(hover.value)}</text>
          </g>
        </g>
      )}
    </svg>
  );
}

// ====== 상수 ======
const REGIONS = ['서울', '인천', '강릉', '대구', '부산', '목포', '서귀포'];

const INITIAL_DATA = {
  서울: { presetAvgTemp1: 12.7, presetAvgTemp2: 13.1, presetAvgPrecip1: 1468, presetAvgPrecip2: 1448, tempYearly: [], precipYearly: [], isExample: true }
};

function ClimateApp() {
  const [data, setData] = useState(INITIAL_DATA);
  const [uploadedFiles, setUploadedFiles] = useState([]);
  const [selectedRegion, setSelectedRegion] = useState(null);
  const [chartType, setChartType] = useState('temp');
  const [showTrend, setShowTrend] = useState(false);
  const [errors, setErrors] = useState([]);
  const [successMsgs, setSuccessMsgs] = useState([]);
  const [isDragging, setIsDragging] = useState(false);
  const fileInputRef = useRef(null);

  const decodeBuffer = (buffer) => {
    let eucKr = null, utf8 = null;
    try { eucKr = new TextDecoder('euc-kr', { fatal: false }).decode(buffer); } catch (e) {}
    try {
      utf8 = new TextDecoder('utf-8', { fatal: false }).decode(buffer);
      if (utf8.charCodeAt(0) === 0xFEFF) utf8 = utf8.slice(1);
    } catch (e) {}
    if (!eucKr) return utf8 || '';
    if (!utf8) return eucKr;
    const eC = (eucKr.match(/[가-힣]/g) || []).length;
    const uC = (utf8.match(/[가-힣]/g) || []).length;
    return eC > uC ? eucKr : utf8;
  };

  const parseCSVFile = (file) => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = decodeBuffer(e.target.result);
      Papa.parse(text, { skipEmptyLines: true, complete: (r) => resolve(r.data), error: reject });
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });

  const processCSVRows = (rows) => {
    if (!rows || rows.length === 0) return null;
    let headerIdx = -1, headers = [];
    for (let i = 0; i < Math.min(30, rows.length); i++) {
      const row = rows[i];
      if (!Array.isArray(row)) continue;
      const cells = row.map(c => String(c || '').trim());
      const mc = cells.filter(c => /^년$|^연도$|^일시$|^기간$|^year$/i.test(c) || /^지점/.test(c) || /평균기온|강수량|기온\(/.test(c)).length;
      if (mc >= 2 && row.length >= 3) { headerIdx = i; headers = cells; break; }
    }
    if (headerIdx === -1) return null;

    let metaRegion = null;
    for (let i = 0; i < headerIdx; i++) {
      const row = rows[i];
      if (!Array.isArray(row)) continue;
      const rt = row.map(c => String(c || '')).join(' ');
      const m = rt.match(/(?:지역|지점)[^:：]*[::：]\s*([가-힣]+)/);
      if (m) { metaRegion = m[1].trim(); break; }
    }

    const yearCol = headers.findIndex(h => /^일시$|^기간$|^연도$|^년$|^year$/i.test(h));
    let regionCol = headers.findIndex(h => /지점명|지역명/.test(h));
    if (regionCol === -1) regionCol = headers.findIndex(h => /^지점$|^지역$/.test(h));
    let tempCol = headers.findIndex(h => /평균기온/.test(h));
    if (tempCol === -1) tempCol = headers.findIndex(h => /기온/.test(h) && !/최고|최저|편차|이상|미만/.test(h));
    const precipCol = headers.findIndex(h => /강수량/.test(h) && !/최/.test(h));

    const useTemp = tempCol !== -1;
    if (yearCol === -1) return null;
    if (!useTemp && precipCol === -1) return null;
    const valueCol = useTemp ? tempCol : precipCol;
    const isTemperature = useTemp;

    const byRegion = {};
    rows.slice(headerIdx + 1).forEach(row => {
      if (!Array.isArray(row)) return;
      const valueRaw = row[valueCol], yearRaw = row[yearCol];
      if (valueRaw === undefined || valueRaw === '' || valueRaw === null) return;

      let region = null;
      if (regionCol !== -1) {
        const rs = String(row[regionCol] || '').trim();
        const pm = rs.match(/[(（]([^)）]+)[)）]/);
        if (pm && /[가-힣]/.test(pm[1])) region = pm[1].trim();
        else if (/[가-힣]/.test(rs)) { const km = rs.match(/[가-힣]+/); if (km) region = km[0]; }
      }
      if (!region) region = metaRegion;
      if (!region) return;

      const ys = String(yearRaw).replace(/[\s\t]/g, '');
      const ym = ys.match(/(\d{4})/);
      if (!ym) return;
      const year = parseInt(ym[1]);
      if (year < 1900 || year > 2100) return;

      const vs = String(valueRaw).replace(/[,\s\t]/g, '');
      const value = parseFloat(vs);
      if (isNaN(value)) return;

      if (!byRegion[region]) byRegion[region] = [];
      byRegion[region].push({ year, value });
    });

    return { byRegion, isTemperature };
  };

  const processFiles = async (files) => {
    if (files.length === 0) return;
    const newErrors = [], newSuccess = [];
    let newData = { ...data };

    for (const file of files) {
      try {
        const rows = await parseCSVFile(file);
        const result = processCSVRows(rows);
        if (!result) { newErrors.push(`${file.name}: 파일 형식을 인식할 수 없습니다.`); continue; }
        const { byRegion, isTemperature } = result;
        if (Object.keys(byRegion).length === 0) { newErrors.push(`${file.name}: 유효한 데이터를 찾을 수 없습니다.`); continue; }

        const updated = [];
        Object.entries(byRegion).forEach(([region, yd]) => {
          if (!REGIONS.includes(region) || yd.length === 0) return;
          const years = yd.map(d => d.year).sort((a, b) => a - b);
          if (!newData[region]) newData[region] = { tempYearly: [], precipYearly: [] };
          newData[region] = { ...newData[region] };
          if (newData[region].isExample) {
            delete newData[region].isExample;
            delete newData[region].presetAvgTemp1; delete newData[region].presetAvgTemp2;
            delete newData[region].presetAvgPrecip1; delete newData[region].presetAvgPrecip2;
          }
          const key = isTemperature ? 'tempYearly' : 'precipYearly';
          const existing = newData[region][key] || [];
          const map = new Map();
          existing.forEach(d => map.set(d.year, d.value));
          yd.forEach(d => map.set(d.year, d.value));
          newData[region][key] = Array.from(map.entries()).map(([y, v]) => ({ year: y, value: v })).sort((a, b) => a.year - b.year);
          updated.push(`${region} (${years[0]}~${years[years.length - 1]} ${isTemperature ? '기온' : '강수량'})`);
        });

        if (updated.length > 0) newSuccess.push(`${file.name} → ${updated.join(', ')}`);
        else newErrors.push(`${file.name}: 대상 지역(인천/강릉/대구/부산/목포/서귀포)을 찾지 못했습니다.`);
      } catch (err) { newErrors.push(`${file.name}: ${err.message || '파일 처리 오류'}`); }
    }

    setData(newData);
    setUploadedFiles(p => [...p, ...files.map(f => f.name)]);
    setErrors(newErrors);
    setSuccessMsgs(newSuccess);
  };

  const handleFileInput = async (e) => { await processFiles(Array.from(e.target.files)); if (fileInputRef.current) fileInputRef.current.value = ''; };
  const handleDrop = async (e) => { e.preventDefault(); setIsDragging(false); await processFiles(Array.from(e.dataTransfer.files).filter(f => f.name.toLowerCase().endsWith('.csv'))); };
  const handleReset = () => { setData(INITIAL_DATA); setUploadedFiles([]); setErrors([]); setSuccessMsgs([]); if (fileInputRef.current) fileInputRef.current.value = ''; };

  const calcPeriodAvg = (yearly, minY, maxY) => {
    if (!yearly || yearly.length === 0) return { value: null, count: 0 };
    const f = yearly.filter(d => d.year >= minY && d.year <= maxY);
    if (f.length === 0) return { value: null, count: 0 };
    return { value: f.reduce((s, d) => s + d.value, 0) / f.length, count: f.length };
  };

  const getAvg = (region, type, period) => {
    const r = data[region];
    if (!r) return { value: null, count: 0 };
    const yearly = type === 'temp' ? r.tempYearly : r.precipYearly;
    if (r.isExample && (!yearly || yearly.length === 0)) {
      const preset = type === 'temp' ? (period === 1 ? r.presetAvgTemp1 : r.presetAvgTemp2) : (period === 1 ? r.presetAvgPrecip1 : r.presetAvgPrecip2);
      return { value: preset, count: 30, isPreset: true };
    }
    const [minY, maxY] = period === 1 ? [1986, 2015] : [1996, 2025];
    return calcPeriodAvg(yearly, minY, maxY);
  };

  const fmtTemp = (v) => (v === null || v === undefined || isNaN(v)) ? '-' : (Math.round(v * 10) / 10).toFixed(1);
  const fmtPrecip = (v) => (v === null || v === undefined || isNaN(v)) ? '-' : Math.round(v).toLocaleString();
  const fmtTempD = (v) => { if (v === null || v === undefined || isNaN(v)) return '-'; const r = Math.round(v * 10) / 10; return (r > 0 ? '+' : '') + r.toFixed(1); };
  const fmtPrecipD = (v) => { if (v === null || v === undefined || isNaN(v)) return '-'; const r = Math.round(v); return (r > 0 ? '+' : '') + r.toLocaleString(); };

  const hasChartData = (region, type) => { const y = data[region]?.[type === 'temp' ? 'tempYearly' : 'precipYearly']; return y && y.length > 0; };
  const hasYearlyData = (region) => hasChartData(region, 'temp') || hasChartData(region, 'precip');
  const getYearlyChartData = (region, type) => { const y = data[region]?.[type === 'temp' ? 'tempYearly' : 'precipYearly'] || []; return [...y].sort((a, b) => a.year - b.year); };

  const handleRowClick = (region) => {
    if (!hasYearlyData(region)) return;
    if (hasChartData(region, 'temp')) setChartType('temp');
    else if (hasChartData(region, 'precip')) setChartType('precip');
    setSelectedRegion(region);
  };

  const allRegionAvg = (type, period) => {
    const vs = REGIONS.map(r => getAvg(r, type, period).value).filter(v => v !== null && v !== undefined && !isNaN(v));
    if (vs.length === 0) return null;
    return vs.reduce((a, b) => a + b, 0) / vs.length;
  };
  const aT1 = allRegionAvg('temp', 1), aT2 = allRegionAvg('temp', 2);
  const aP1 = allRegionAvg('precip', 1), aP2 = allRegionAvg('precip', 2);
  // 표시되는 반올림된 평균값으로 증감 계산
  const aT1R = aT1 !== null ? Math.round(aT1 * 10) / 10 : null;
  const aT2R = aT2 !== null ? Math.round(aT2 * 10) / 10 : null;
  const aP1R = aP1 !== null ? Math.round(aP1) : null;
  const aP2R = aP2 !== null ? Math.round(aP2) : null;
  const aTD = (aT1R !== null && aT2R !== null) ? aT2R - aT1R : null;
  const aPD = (aP1R !== null && aP2R !== null) ? aP2R - aP1R : null;

  const renderCell = (region, type, period) => {
    const { value, count } = getAvg(region, type, period);
    const fmt = type === 'temp' ? fmtTemp : fmtPrecip;
    return (
      <div>
        <div className="tabular-nums">{fmt(value)}</div>
        {value !== null && count > 0 && count < 30 && !data[region]?.isExample && (
          <div className="text-[10px] text-amber-600 font-normal">{count}년</div>
        )}
      </div>
    );
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-sky-50 via-blue-50 to-indigo-50 p-3 sm:p-6 md:p-8">
      <div className="max-w-6xl mx-auto">
        {/* 헤더 */}
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6 relative overflow-hidden">
          <div className="absolute top-0 right-0 w-64 h-64 bg-gradient-to-br from-sky-100 to-blue-100 rounded-full -mr-32 -mt-32 opacity-50"></div>
          <div className="relative">
            <div className="flex items-center gap-3 mb-2">
              <div className="bg-gradient-to-br from-sky-400 to-blue-500 p-3 rounded-2xl shadow-md"><Cloud className="w-7 h-7 text-white" /></div>
              <div className="flex-1">
                <div className="text-xs font-semibold text-sky-600 tracking-wider uppercase mb-1">Ⅱ. 과학 탐구의 과정과 절차 · 활동 1</div>
                <h1 className="text-xl md:text-2xl lg:text-3xl font-bold text-slate-800">연대별 한반도의 기후 변화 경향성 파악하기</h1>
              </div>
            </div>
            <p className="text-sm md:text-base text-slate-600 mt-3 max-w-2xl">1986~2015년과 1996~2025년의 30년간 평균 기온·강수량을 비교해 우리나라 기후 변화 경향성을 알아봅시다.</p>
          </div>
        </div>

        {/* STEP 1 */}
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6">
          <div className="flex items-center gap-3 mb-4">
            <div className="bg-gradient-to-br from-sky-500 to-blue-600 text-white w-9 h-9 rounded-xl flex items-center justify-center font-bold shadow-md">1</div>
            <h2 className="text-lg md:text-xl font-bold text-slate-800">기상청에서 자료 검색하기</h2>
          </div>
          <div className="bg-sky-50 border border-sky-200 rounded-2xl p-4 md:p-5 mb-4">
            <div className="flex items-start gap-3">
              <Info className="w-5 h-5 text-sky-600 mt-0.5 flex-shrink-0" />
              <div className="text-sm text-slate-700 leading-relaxed">
                <p className="font-bold mb-2 text-slate-800">📋 검색 조건</p>
                <div className="grid sm:grid-cols-2 gap-x-6 gap-y-1">
                  <div>• 자료구분: <span className="font-semibold text-sky-700">년</span></div>
                  <div>• 자료형태: <span className="font-semibold text-sky-700">기본</span></div>
                  <div className="sm:col-span-2">• 기간: <span className="font-semibold text-sky-700">1986~2015</span> 그리고 <span className="font-semibold text-sky-700">1996~2025</span> (각 30년)</div>
                  <div className="sm:col-span-2">• 요소: <span className="font-semibold text-sky-700">평균기온</span>, <span className="font-semibold text-sky-700">강수량</span></div>
                  <div className="sm:col-span-2">• 지점: <span className="font-semibold text-red-600">서울 제외</span>, 인천·강릉·대구·부산·목포·서귀포 중 선택 (조원과 겹치지 않게)</div>
                </div>
                <p className="mt-3 text-xs text-slate-500 leading-relaxed">※ 30년으로 설정하는 이유: <b>'기후'</b>는 특정 지역에서 수십 년(통상 30년) 동안 나타나는 기상의 평균적·종합적 상태를 의미하기 때문이에요.</p>
              </div>
            </div>
          </div>
          <a href="https://data.kma.go.kr/climate/RankState/selectRankStatisticsDivisionList.do?pgmNo=179" target="_blank" rel="noopener noreferrer" className="inline-flex items-center gap-2 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-semibold px-5 py-3 rounded-2xl transition-all shadow-md hover:shadow-lg active:scale-95">
            <ExternalLink className="w-5 h-5" />기상청 기상자료개방포털 열기
          </a>
          <p className="text-xs text-slate-500 mt-2">검색 후 [CSV 다운로드] 버튼을 클릭해 파일을 받아주세요. (회원가입 문구는 '확인' 누르고 진행)</p>
        </div>

        {/* STEP 2 */}
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6">
          <div className="flex items-center gap-3 mb-4">
            <div className="bg-gradient-to-br from-sky-500 to-blue-600 text-white w-9 h-9 rounded-xl flex items-center justify-center font-bold shadow-md">2</div>
            <h2 className="text-lg md:text-xl font-bold text-slate-800">CSV 파일 업로드하기</h2>
          </div>
          <p className="text-sm text-slate-600 mb-4">다운받은 CSV 파일을 업로드하면 평균값이 자동 계산되어 표가 채워져요. 여러 파일을 한 번에 올려도 되고, 같은 지역의 여러 기간 파일도 자동으로 합쳐집니다.</p>
          <div className="flex flex-col sm:flex-row gap-3 mb-4">
            <label onDragOver={(e) => { e.preventDefault(); setIsDragging(true); }} onDragLeave={() => setIsDragging(false)} onDrop={handleDrop} className={`flex-1 cursor-pointer transition-all ${isDragging ? 'scale-[1.01]' : ''}`}>
              <input ref={fileInputRef} type="file" accept=".csv" multiple onChange={handleFileInput} className="hidden" />
              <div className={`border-2 border-dashed rounded-2xl p-6 md:p-8 transition-all text-center ${isDragging ? 'border-sky-500 bg-sky-50' : 'border-sky-300 hover:border-sky-500 hover:bg-sky-50'}`}>
                <div className="bg-sky-100 w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-3"><Upload className="w-7 h-7 text-sky-600" /></div>
                <p className="text-slate-700 font-semibold">CSV 파일 선택 또는 끌어다 놓기</p>
                <p className="text-xs text-slate-500 mt-1">.csv 파일 · 여러 개 동시 선택 가능</p>
              </div>
            </label>
            {uploadedFiles.length > 0 && (
              <button onClick={handleReset} className="sm:w-auto bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium px-5 py-3 rounded-2xl transition-colors flex items-center justify-center gap-2 active:scale-95">
                <RotateCcw className="w-4 h-4" />초기화
              </button>
            )}
          </div>
          {successMsgs.length > 0 && (
            <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-3 mb-2 fade-in">
              <div className="space-y-1">{successMsgs.map((msg, i) => (<div key={i} className="flex items-start gap-2 text-sm text-emerald-800"><CheckCircle2 className="w-4 h-4 mt-0.5 flex-shrink-0 text-emerald-600" /><span>{msg}</span></div>))}</div>
            </div>
          )}
          {errors.length > 0 && (
            <div className="bg-red-50 border border-red-200 rounded-2xl p-3 mb-2 fade-in">
              <div className="space-y-1">{errors.map((err, i) => (<div key={i} className="flex items-start gap-2 text-sm text-red-800"><AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0 text-red-600" /><span>{err}</span></div>))}</div>
            </div>
          )}
          {uploadedFiles.length > 0 && (
            <div className="mt-3">
              <p className="text-xs font-semibold text-slate-500 mb-2 uppercase tracking-wider">업로드한 파일</p>
              <div className="flex flex-wrap gap-2">{uploadedFiles.map((name, i) => (<div key={i} className="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 text-xs px-3 py-1.5 rounded-full"><FileText className="w-3 h-3" />{name}</div>))}</div>
            </div>
          )}
        </div>

        {/* STEP 3 */}
        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 mb-6">
          <div className="flex items-center gap-3 mb-2">
            <div className="bg-gradient-to-br from-sky-500 to-blue-600 text-white w-9 h-9 rounded-xl flex items-center justify-center font-bold shadow-md">3</div>
            <h2 className="text-lg md:text-xl font-bold text-slate-800">분석 결과 확인하기</h2>
          </div>
          <p className="text-sm text-slate-600 mb-5 ml-12">📊 데이터가 입력된 지역명을 클릭하면 연도별 그래프를 볼 수 있어요</p>
          <div className="overflow-x-auto rounded-2xl border border-slate-200">
            <table className="w-full border-collapse text-sm min-w-[640px]">
              <thead>
                <tr>
                  <th rowSpan="2" className="bg-slate-50 px-3 py-3 font-semibold text-slate-700 border-b border-r border-slate-200">지역</th>
                  <th colSpan="3" className="bg-orange-50 px-3 py-2 font-semibold text-orange-700 border-b border-r border-slate-200"><div className="flex items-center justify-center gap-1.5"><Thermometer className="w-4 h-4" />평균기온 (℃)</div></th>
                  <th colSpan="3" className="bg-blue-50 px-3 py-2 font-semibold text-blue-700 border-b border-slate-200"><div className="flex items-center justify-center gap-1.5"><Droplets className="w-4 h-4" />강수량 (mm)</div></th>
                </tr>
                <tr className="text-xs">
                  <th className="bg-orange-50 px-2 py-2 font-medium text-orange-700 border-b border-slate-200">1986~2015 (㉠)</th>
                  <th className="bg-orange-50 px-2 py-2 font-medium text-orange-700 border-b border-slate-200">1996~2025 (㉡)</th>
                  <th className="bg-orange-50 px-2 py-2 font-medium text-orange-700 border-b border-r border-slate-200">증감 (㉡-㉠)</th>
                  <th className="bg-blue-50 px-2 py-2 font-medium text-blue-700 border-b border-slate-200">1986~2015 (㉢)</th>
                  <th className="bg-blue-50 px-2 py-2 font-medium text-blue-700 border-b border-slate-200">1996~2025 (㉣)</th>
                  <th className="bg-blue-50 px-2 py-2 font-medium text-blue-700 border-b border-slate-200">증감 (㉣-㉢)</th>
                </tr>
              </thead>
              <tbody>
                {REGIONS.map((region) => {
                  const d = data[region] || {};
                  const t1 = getAvg(region, 'temp', 1), t2 = getAvg(region, 'temp', 2);
                  const p1 = getAvg(region, 'precip', 1), p2 = getAvg(region, 'precip', 2);
                  // 표시되는 반올림된 값으로 증감 계산 (㉡-㉠, ㉣-㉢)
                  const t1R = t1.value !== null ? Math.round(t1.value * 10) / 10 : null;
                  const t2R = t2.value !== null ? Math.round(t2.value * 10) / 10 : null;
                  const p1R = p1.value !== null ? Math.round(p1.value) : null;
                  const p2R = p2.value !== null ? Math.round(p2.value) : null;
                  const tD = (t1R !== null && t2R !== null) ? t2R - t1R : null;
                  const pD = (p1R !== null && p2R !== null) ? p2R - p1R : null;
                  const canClick = hasYearlyData(region);
                  return (
                    <tr key={region} onClick={() => handleRowClick(region)} className={`${canClick ? 'cursor-pointer hover:bg-sky-50' : ''} ${d.isExample ? 'bg-red-50/40' : ''} transition-colors`}>
                      <td className="px-3 py-3 font-semibold border-r border-b border-slate-200">
                        <div className="flex items-center justify-between gap-2">
                          <div className="flex items-center gap-2">
                            <span className={d.isExample ? 'text-red-600' : 'text-slate-700'}>{region}</span>
                            {d.isExample && (<span className="text-[10px] font-medium text-red-500 bg-red-100 px-1.5 py-0.5 rounded">예시</span>)}
                          </div>
                          {canClick && <ChevronRight className="w-4 h-4 text-sky-500" />}
                        </div>
                      </td>
                      <td className="px-3 py-3 text-center border-b border-slate-200">{renderCell(region, 'temp', 1)}</td>
                      <td className="px-3 py-3 text-center border-b border-slate-200">{renderCell(region, 'temp', 2)}</td>
                      <td className={`px-3 py-3 text-center font-semibold border-r border-b border-slate-200 tabular-nums ${tD > 0 ? 'text-red-600' : tD < 0 ? 'text-blue-600' : 'text-slate-400'}`}>{fmtTempD(tD)}</td>
                      <td className="px-3 py-3 text-center border-b border-slate-200">{renderCell(region, 'precip', 1)}</td>
                      <td className="px-3 py-3 text-center border-b border-slate-200">{renderCell(region, 'precip', 2)}</td>
                      <td className={`px-3 py-3 text-center font-semibold border-b border-slate-200 tabular-nums ${pD > 0 ? 'text-blue-600' : pD < 0 ? 'text-red-600' : 'text-slate-400'}`}>{fmtPrecipD(pD)}</td>
                    </tr>
                  );
                })}
                <tr className="bg-gradient-to-r from-slate-50 to-slate-100 font-semibold">
                  <td className="px-3 py-3 text-slate-800 border-r border-slate-200">평균</td>
                  <td className="px-3 py-3 text-center tabular-nums">{fmtTemp(aT1)}</td>
                  <td className="px-3 py-3 text-center tabular-nums">{fmtTemp(aT2)}</td>
                  <td className={`px-3 py-3 text-center border-r border-slate-200 tabular-nums ${aTD > 0 ? 'text-red-600' : aTD < 0 ? 'text-blue-600' : 'text-slate-400'}`}>{fmtTempD(aTD)}</td>
                  <td className="px-3 py-3 text-center tabular-nums">{fmtPrecip(aP1)}</td>
                  <td className="px-3 py-3 text-center tabular-nums">{fmtPrecip(aP2)}</td>
                  <td className={`px-3 py-3 text-center tabular-nums ${aPD > 0 ? 'text-blue-600' : aPD < 0 ? 'text-red-600' : 'text-slate-400'}`}>{fmtPrecipD(aPD)}</td>
                </tr>
              </tbody>
            </table>
          </div>
          <div className="mt-4 flex flex-wrap gap-x-4 gap-y-2 text-xs text-slate-500">
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-red-100 border border-red-300 rounded"></div><span>온도 상승 / 강수 감소</span></div>
            <div className="flex items-center gap-1.5"><div className="w-3 h-3 bg-blue-100 border border-blue-300 rounded"></div><span>온도 하강 / 강수 증가</span></div>
            <div className="flex items-center gap-1.5"><span className="text-amber-600 font-semibold">N년</span><span>= 30년 미만 데이터로 계산된 값</span></div>
          </div>
        </div>

        <div className="text-center text-xs text-slate-400 py-4">🌏 자료 출처: 기상청 기상자료개방포털 (data.kma.go.kr)</div>
      </div>

      {/* 모달 */}
      {selectedRegion && (
        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center p-3 sm:p-4 z-50 fade-in" onClick={() => setSelectedRegion(null)}>
          <div className="bg-white rounded-3xl shadow-2xl p-5 sm:p-6 md:p-7 max-w-4xl w-full max-h-[92vh] overflow-y-auto" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between mb-5">
              <div>
                <div className="flex items-center gap-2 mb-1"><BarChart3 className="w-5 h-5 text-sky-600" /><h3 className="text-xl md:text-2xl font-bold text-slate-800">{selectedRegion}</h3></div>
                <p className="text-sm text-slate-500">연도별 {chartType === 'temp' ? '평균 기온' : '강수량'} 변화</p>
              </div>
              <button onClick={() => setSelectedRegion(null)} className="text-slate-400 hover:text-slate-700 p-2 hover:bg-slate-100 rounded-xl transition-colors"><X className="w-5 h-5" /></button>
            </div>
            <div className="flex gap-2 mb-4 flex-wrap">
              <button onClick={() => setChartType('temp')} disabled={!hasChartData(selectedRegion, 'temp')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl font-medium text-sm transition-all ${chartType === 'temp' ? 'bg-gradient-to-r from-orange-500 to-amber-500 text-white shadow-md' : hasChartData(selectedRegion, 'temp') ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'bg-slate-50 text-slate-300 cursor-not-allowed'}`}>
                <Thermometer className="w-4 h-4" />평균기온
              </button>
              <button onClick={() => setChartType('precip')} disabled={!hasChartData(selectedRegion, 'precip')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl font-medium text-sm transition-all ${chartType === 'precip' ? 'bg-gradient-to-r from-blue-500 to-sky-500 text-white shadow-md' : hasChartData(selectedRegion, 'precip') ? 'bg-slate-100 text-slate-700 hover:bg-slate-200' : 'bg-slate-50 text-slate-300 cursor-not-allowed'}`}>
                <Droplets className="w-4 h-4" />강수량
              </button>
              <div className="flex-1"></div>
              <button onClick={() => setShowTrend(t => !t)} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl font-medium text-sm transition-all border-2 ${showTrend ? 'bg-red-500 text-white border-red-500 shadow-md' : 'bg-white text-red-600 border-red-300 hover:bg-red-50'}`}>
                <svg viewBox="0 0 24 24" className="w-4 h-4" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="3" y1="20" x2="21" y2="4" strokeDasharray="3 2"/></svg>
                추세선 {showTrend ? '숨기기' : '표시'}
              </button>
            </div>
            <div className="bg-slate-50 rounded-2xl p-3 md:p-4" style={{ height: 380 }}>
              <SVGLineChart
                data={getYearlyChartData(selectedRegion, chartType)}
                color={chartType === 'temp' ? '#f97316' : '#3b82f6'}
                yLabel={chartType === 'temp' ? '평균기온 (℃)' : '강수량 (mm)'}
                unit={chartType === 'temp' ? '℃' : 'mm'}
                p1Avg={getAvg(selectedRegion, chartType, 1).value}
                p2Avg={getAvg(selectedRegion, chartType, 2).value}
                chartType={chartType}
                showTrend={showTrend}
              />
            </div>
            {showTrend && (() => {
              const cData = getYearlyChartData(selectedRegion, chartType);
              const tr = linearRegression(cData);
              if (!tr) return null;
              const unit = chartType === 'temp' ? '℃' : 'mm';
              const sign = tr.intercept >= 0 ? '+' : '−';
              const absI = Math.abs(tr.intercept);
              const slopeStr = chartType === 'temp' ? tr.slope.toFixed(4) : tr.slope.toFixed(2);
              const interStr = chartType === 'temp' ? absI.toFixed(2) : absI.toFixed(1);
              const change30 = tr.slope * 30;
              return (
                <div className="mt-3 bg-red-50 border border-red-200 rounded-2xl p-4 fade-in">
                  <div className="flex items-center gap-2 mb-2">
                    <div className="w-4 h-0.5 bg-red-500" style={{borderTop: '2px dashed #dc2626', background: 'transparent'}}></div>
                    <span className="text-xs font-bold text-red-700 uppercase tracking-wider">추세선 (선형 회귀)</span>
                  </div>
                  <div className="font-mono text-base md:text-lg font-bold text-slate-800 tabular-nums">
                    y = {slopeStr}x {sign} {interStr}
                  </div>
                  <div className="text-xs text-slate-600 mt-2 grid grid-cols-1 sm:grid-cols-2 gap-1">
                    <div>• 결정계수 R² = <span className="font-semibold tabular-nums">{tr.r2.toFixed(4)}</span></div>
                    <div>• 연간 변화율: <span className="font-semibold tabular-nums">{(tr.slope >= 0 ? '+' : '') + (chartType === 'temp' ? tr.slope.toFixed(4) : tr.slope.toFixed(2))} {unit}/년</span></div>
                    <div className="sm:col-span-2">• 30년간 추정 변화: <span className="font-semibold tabular-nums">{(change30 >= 0 ? '+' : '') + (chartType === 'temp' ? change30.toFixed(2) : Math.round(change30).toLocaleString())} {unit}</span></div>
                  </div>
                </div>
              );
            })()}
            <div className="grid grid-cols-2 md:grid-cols-3 gap-3 mt-5">
              {(() => {
                const v1R = getAvg(selectedRegion, chartType, 1), v2R = getAvg(selectedRegion, chartType, 2);
                const v1 = v1R.value, v2 = v2R.value;
                const fmt = chartType === 'temp' ? fmtTemp : fmtPrecip;
                const fmtD = chartType === 'temp' ? fmtTempD : fmtPrecipD;
                const unit = chartType === 'temp' ? '℃' : 'mm';
                // 표시되는 반올림된 값으로 증감 계산
                const v1Round = v1 !== null ? (chartType === 'temp' ? Math.round(v1 * 10) / 10 : Math.round(v1)) : null;
                const v2Round = v2 !== null ? (chartType === 'temp' ? Math.round(v2 * 10) / 10 : Math.round(v2)) : null;
                const delta = (v1Round !== null && v2Round !== null) ? v2Round - v1Round : null;
                const dc = delta === null ? 'text-slate-400' : (chartType === 'temp' ? (delta > 0 ? 'text-red-600' : delta < 0 ? 'text-blue-600' : 'text-slate-600') : (delta > 0 ? 'text-blue-600' : delta < 0 ? 'text-red-600' : 'text-slate-600'));
                return (
                  <>
                    <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-2xl p-4">
                      <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">1986~2015 평균{v1R.count > 0 && v1R.count < 30 && !v1R.isPreset && (<span className="text-amber-600 normal-case ml-1">({v1R.count}년)</span>)}</div>
                      <div className="text-xl md:text-2xl font-bold text-slate-800 tabular-nums">{fmt(v1)} <span className="text-sm font-medium text-slate-500">{unit}</span></div>
                    </div>
                    <div className="bg-gradient-to-br from-slate-50 to-slate-100 rounded-2xl p-4">
                      <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">1996~2025 평균{v2R.count > 0 && v2R.count < 30 && !v2R.isPreset && (<span className="text-amber-600 normal-case ml-1">({v2R.count}년)</span>)}</div>
                      <div className="text-xl md:text-2xl font-bold text-slate-800 tabular-nums">{fmt(v2)} <span className="text-sm font-medium text-slate-500">{unit}</span></div>
                    </div>
                    <div className={`rounded-2xl p-4 col-span-2 md:col-span-1 ${delta === null ? 'bg-slate-50' : (chartType === 'temp' ? (delta > 0 ? 'bg-red-50' : 'bg-blue-50') : (delta > 0 ? 'bg-blue-50' : 'bg-red-50'))}`}>
                      <div className="text-[11px] font-semibold text-slate-500 uppercase tracking-wider mb-1">증감량</div>
                      <div className={`text-xl md:text-2xl font-bold tabular-nums ${dc}`}>{fmtD(delta)} <span className="text-sm font-medium opacity-70">{unit}</span></div>
                    </div>
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ClimateApp />);
</script>
</body>
</html>
